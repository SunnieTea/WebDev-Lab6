<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Income Page</title>
</head>

<body>
    <h1>Add Income</h1>
    <form>
        <label for="incomeSource">Income Source Name:</label>
        <input type="text" name="incomeSource" id="incomeSource" minlength="3" required><br>

        <label for="amount">Amount:</label>
        <input type="number" name="amount" id="amount" min="0.01" step="0.01" required><br>

        <label for="frequency">Frequency:</label>
        <select name="frequency" id="frequency">
            <option value="Monthly">Monthly</option>
            <option value="Weekly">Weekly</option>
            <option value="Yearly">Yearly</option>
        </select><br>

        <button type="submit">Submit</button>
    </form>
</body>

</html>
