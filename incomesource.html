<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Income Page</title>
</head>

<body>
    <main class="container">
        <h1>Add Income</h1>
        <form>
            <div class="mb3">
                <label for="incomeSource" class="form-label">Income Source Name:</label>
                <input type="text" name="incomeSource" id="incomeSource" minlength="3" class="form-control"
                    required><br>

                <label for="amount" class="form-label">Amount:</label>
                <input type="number" name="amount" id="amount" min="0.01" step="0.01" class="form-control" required><br>

                <label for="frequency" class="form-label">Frequency:</label>
                <select name="frequency" id="frequency" class="form-control">
                    <option value="Monthly">Monthly</option>
                    <option value="Weekly">Weekly</option>
                    <option value="Yearly">Yearly</option>
                </select><br>

                <button type="submit" class="btn btn-primary">Submit</button>
            </div>
        </form>
    </main>
</body>

</html>
